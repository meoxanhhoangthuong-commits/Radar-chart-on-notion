<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radar Scope — Skill Chart</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================= BACKDROP ============================= -->
  <div class="backdrop" aria-hidden="true">
    <div class="backdrop-glow"></div>
    <div class="backdrop-grid"></div>
  </div>

  <!-- ============================= HEADER =============================== -->
  <header class="app-header">
    <div class="app-title">
      <span class="app-title__eyebrow">SIG&#8202;-&#8202;7 / SKILL SCOPE</span>
      <h1 class="app-title__main">Radar Console</h1>
    </div>
    <button id="settingsBtn" class="icon-btn" type="button" aria-label="Open settings" aria-expanded="false" aria-controls="settingsPanel">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
      <span class="icon-btn__label">Settings</span>
    </button>
  </header>

  <!-- ============================= MAIN STAGE ============================ -->
  <main class="stage">
    <div class="scope">
      <div class="scope__ring scope__ring--outer"></div>
      <div class="scope__ring scope__ring--inner"></div>
      <div class="scope__sweep"></div>
      <div class="scope__bracket scope__bracket--tl"></div>
      <div class="scope__bracket scope__bracket--tr"></div>
      <div class="scope__bracket scope__bracket--bl"></div>
      <div class="scope__bracket scope__bracket--br"></div>
      <canvas id="radarChart"></canvas>
    </div>
  </main>

  <!-- =========================== SETTINGS PANEL ========================== -->
  <aside id="settingsPanel" class="panel" aria-hidden="true">
    <div class="panel__header">
      <h2>Console Settings</h2>
      <button id="closePanel" class="icon-btn icon-btn--ghost" type="button" aria-label="Close settings">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="panel__body">

      <section class="panel__section">
        <h3 class="panel__section-title">Appearance</h3>

        <div class="field-grid">

          <div class="color-field">
            <label for="fillColorPicker">Fill</label>
            <div class="color-field__row">
              <input type="color" id="fillColorPicker" class="color-swatch" />
              <input type="text" id="fillColorText" class="color-text" spellcheck="false" />
            </div>
          </div>

          <div class="color-field">
            <label for="lineColorPicker">Line</label>
            <div class="color-field__row">
              <input type="color" id="lineColorPicker" class="color-swatch" />
              <input type="text" id="lineColorText" class="color-text" spellcheck="false" />
            </div>
          </div>

          <div class="color-field">
            <label for="gridColorPicker">Grid</label>
            <div class="color-field__row">
              <input type="color" id="gridColorPicker" class="color-swatch" />
              <input type="text" id="gridColorText" class="color-text" spellcheck="false" />
            </div>
          </div>

          <div class="color-field">
            <label for="textColorPicker">Text</label>
            <div class="color-field__row">
              <input type="color" id="textColorPicker" class="color-swatch" />
              <input type="text" id="textColorText" class="color-text" spellcheck="false" />
            </div>
          </div>

        </div>
      </section>

      <section class="panel__section">
        <div class="panel__section-header">
          <h3 class="panel__section-title">Skills</h3>
          <button id="addSkillBtn" class="btn btn--small" type="button">+ Add skill</button>
        </div>
        <div id="skillsList" class="skills-list"></div>
      </section>

      <section class="panel__section">
        <button id="resetBtn" class="btn btn--ghost btn--full" type="button">Reset to defaults</button>
      </section>

    </div>
  </aside>

  <div id="scrim" class="scrim" aria-hidden="true"></div>

  <script src="script.js"></script>
</body>
</html>
